name: CI

# Scaffold. Real checks are enabled at build step 1, once packages have
# real code and a committed pnpm lockfile. Kept as a no-op until then so
# the repo isn't red on arrival.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: echo "CI scaffold — enable install/typecheck/lint/test at build step 1."
